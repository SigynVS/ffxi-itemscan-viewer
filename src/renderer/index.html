<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>FFXI Item Scan</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="title">
      <h1>FFXI Item Scan</h1>
      <span id="meta" class="meta">Waiting for inventory.json…</span>
    </div>
    <div class="controls">
      <input id="search" type="text" placeholder="Filter items…" />
      <label class="chk"><input id="onlyVendor" type="checkbox" /> Has value</label>
      <label class="chk"><input id="onlyGobbie" type="checkbox" /> Gobbiebag</label>
      <label class="chk"><input id="onlyQuest" type="checkbox" /> Quest item</label>
      <label class="chk">Speed
        <select id="speed" title="Parallel price fetches. Higher = faster but harder on FFXIAH.">
          <option value="1">1×</option>
          <option value="3" selected>3×</option>
          <option value="5">5×</option>
          <option value="8">8×</option>
        </select>
      </label>
      <button id="getPrices">Fetch AH prices</button>
    </div>
    <div id="stats" class="stats"></div>
  </header>

  <div id="error" class="error hidden"></div>

  <section id="progress" class="progress"></section>

  <details id="missionPanel" class="missions">
    <summary>Mission progress <span class="fame-note">(stage numbers; names are a work in progress)</span></summary>
    <div id="missionGrid" class="mission-grid"></div>
  </details>

  <details id="roePanel" class="roe">
    <summary>Records of Eminence <span id="roeCount" class="roe-count"></span></summary>
    <div id="roeList" class="roe-list"></div>
  </details>

  <details id="famePanel" class="fame">
    <summary>Fame tracker <span class="fame-note">(manual — fame can't be read from the game)</span></summary>
    <div id="fameGrid" class="fame-grid"></div>
  </details>

  <main>
    <table id="grid">
      <thead>
        <tr>
          <th class="sortable" data-key="name">Item</th>
          <th class="sortable num" data-key="count">Qty</th>
          <th class="sortable" data-key="container_name">Where</th>
          <th>What it is</th>
          <th class="sortable num" data-key="vendorPrice">Vendor</th>
          <th class="sortable num" data-key="ah">AH median</th>
          <th class="sortable" data-key="gobbiebag">Gobbiebag</th>
          <th class="sortable" data-key="quests">Quests / Missions</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
